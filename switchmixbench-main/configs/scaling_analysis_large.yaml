seed: 42

train_paths:
  - data/processed/nli_train_fr-en.jsonl
test_paths:
  - data/processed/nli_test_fr-en.jsonl

# "Full" model list for scaling experiments.
models:
  - distilbert-base-multilingual-cased
  - bert-base-multilingual-cased
  - xlm-roberta-base
  - xlm-roberta-large

max_length: 256
epochs: 1.0
batch_size: 16
lr: 2e-5

# Larger-scale regime: use all available examples by default.
max_train_examples: null
max_test_examples: null

output_csv: results/tables/scaling_results_large.csv

