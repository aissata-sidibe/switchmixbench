
# This configuration is designed for quick
# experiments on CPU to validate the scaling
# pipeline before running the large version.

seed: 42

task: nli



train_paths:
  - data/processed/nli_train_fr-en.jsonl

eval_paths:
  - data/processed/nli_test_fr-en.jsonl

max_train_pairs: 500
max_eval_pairs: 500



max_length: 128



epochs: 1
max_steps: 100

learning_rate: 2e-5

per_device_train_batch_size: 8
per_device_eval_batch_size: 8

gradient_accumulation_steps: 1



models:

  encoder:
    - distilbert-base-multilingual-cased
    - bert-base-multilingual-cased



device: cpu



output_csv: results/tables/scaling_results_fast.csv