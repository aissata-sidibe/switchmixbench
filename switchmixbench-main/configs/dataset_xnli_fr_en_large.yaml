seed: 42

task: nli

language_pair:
  clean_lang: fr
  insert_lang: en

source:
  kind: hf
  dataset_name: xnli
  allow_fallback_synthetic: true

splits:
  train:
    source_split: train
    n_examples: 80000   # larger-scale regime
  test:
    source_split: validation
    n_examples: 15000

perturbations:
  code_switch:
    p_switch: 0.35
  noise:
    p: 0.15

output:
  out_dir: data/processed

